# Configuração Alembic. A URL do banco NÃO fica aqui — é lida das settings
# (climate_esg.config) em migrations/env.py, respeitando .env / DATABASE_URL.

[alembic]
script_location = src/climate_esg/db/migrations
prepend_sys_path = .
path_separator = os
# Nome de arquivo de revisão: 0001_descricao, 0002_descricao, ...
file_template = %%(rev)s_%%(slug)s

[post_write_hooks]
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
