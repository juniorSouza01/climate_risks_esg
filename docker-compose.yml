services:
  db:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.postgres
    environment:
      POSTGRES_USER: climate_esg
      POSTGRES_PASSWORD: changeme_local_only
      POSTGRES_DB: climate_esg
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climate_esg -d climate_esg"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://climate_esg:changeme_local_only@db:5432/climate_esg
      MLFLOW_TRACKING_URI: /app/mlruns
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  pgdata:
